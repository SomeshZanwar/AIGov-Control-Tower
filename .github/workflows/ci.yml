name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python source
        run: |
          python -m compileall src scripts

      - name: Import FastAPI app
        run: |
          python -c "from src.aigov.api.main import app; print(app.title)"

      - name: Import governance pipeline modules
        run: |
          python -c "from src.aigov.risk.scorer import score_all_systems; print('risk module ok')"
          python -c "from src.aigov.policy.evaluator import evaluate_all_policies; print('policy module ok')"
          python -c "from src.aigov.reports.audit_report import generate_all_audit_reports; print('reports module ok')"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build